<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1a14"/>
      <stop offset="100%" stop-color="#0a0806"/>
    </linearGradient>
    <linearGradient id="fg" gradientUnits="userSpaceOnUse" x1="3.5" y1="5" x2="27" y2="27">
      <stop offset="0%" stop-color="#ff8844"/>
      <stop offset="55%" stop-color="#d46000"/>
      <stop offset="100%" stop-color="#8c3000"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="5" fill="url(#bg)"/>
  <!-- H: left vertical bar -->
  <rect x="3.5" y="5" width="2.5" height="22" fill="url(#fg)"/>
  <!-- H: right vertical bar -->
  <rect x="10.5" y="5" width="2.5" height="22" fill="url(#fg)"/>
  <!-- H: horizontal crossbar -->
  <rect x="3.5" y="15" width="9.5" height="2" fill="url(#fg)"/>
  <!-- C: left vertical bar -->
  <rect x="15.5" y="5" width="2.5" height="22" fill="url(#fg)"/>
  <!-- C: top bar -->
  <rect x="15.5" y="5" width="11" height="2.5" fill="url(#fg)"/>
  <!-- C: bottom bar -->
  <rect x="15.5" y="24.5" width="11" height="2.5" fill="url(#fg)"/>
</svg>
